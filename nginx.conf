server {
    # Port 8080 — non-privileged, изисква се за non-root user в Kubernetes
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression за по-бързо зареждане
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml+rss
        application/xml
        image/svg+xml;

    # SPA routing — всички пътища връщат index.html
    # Това е важно за React Router да работи (/login, /notes/:id, /public/:token)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint — използва се от Kubernetes liveness probe
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Cache на static assets (JS, CSS, images, fonts) за 1 година
    # Vite добавя hash в имената, така че никога няма да се сблъскаме със стара версия
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Не кешираме index.html за да виждат потребителите новите версии
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Скриваме nginx version
    server_tokens off;
}
